<body>

<main class="rack" id="bpm-finder-app">
  <p class="eyebrow">LYGO · Biophase7 · Creative</p>
  <h1>LYGO BPM Finder</h1>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="audio/*" aria-label="Choose an audio file">
    <p><strong>Drop an audio file</strong> or click to browse — MP3, WAV, FLAC</p>

  <div class="readout">
    <span class="pulse-dot" id="pulseDot"></span>

  </div>
  <p class="status" id="status">Nothing loaded yet. Audio stays on your device.</p>

  <div class="confidence-row" id="confidenceRow" style="display:none;">
    <span class="confidence-label">Confidence</span>

  </div>

  <canvas id="wave" width="900" height="84"></canvas>

  <div class="controls">
    <button id="halfBtn" disabled>÷2</button>
    <button id="doubleBtn" disabled>×2</button>
    <span class="spacer"></span>
    <button class="tap-btn" id="tapBtn">Tap tempo</button>
  </div>
</main>


<p class="site-footer">

<script type="module">
  import detect from 'https://cdn.jsdelivr.net/npm/bpm-detective/+esm';

  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const bpmValue   = document.getElementById('bpmValue');
  const pulseDot   = document.getElementById('pulseDot');
  const statusEl   = document.getElementById('status');
  const halfBtn    = document.getElementById('halfBtn');
  const doubleBtn  = document.getElementById('doubleBtn');
  const tapBtn     = document.getElementById('tapBtn');
  const confRow    = document.getElementById('confidenceRow');
  const confFill   = document.getElementById('confidenceFill');
  const canvas     = document.getElementById('wave');
  const ctx2d      = canvas.getContext('2d');

  let currentBpm = null;
  let audioBuffer = null;

  function setBpm(bpm) {
    currentBpm = bpm;
    bpmValue.textContent = bpm ? bpm.toFixed(1) : '—';
    bpmValue.classList.toggle('live', !!bpm);
    if (bpm) {
      document.documentElement.style.setProperty('--beat-ms', `${60000 / bpm}ms`);
      pulseDot.classList.add('on');
      halfBtn.disabled = bpm / 2 < 30;
      doubleBtn.disabled = bpm * 2 > 300;
    } else {
      pulseDot.classList.remove('on');
      halfBtn.disabled = true;
      doubleBtn.disabled = true;
    }
  }

  function setStatus(msg, warn = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle('warn', warn);
  }

  // Rough confidence heuristic: how tightly detected beat intervals cluster.
  // This is a real, if approximate, signal derived from the audio itself —
  // not a placeholder number. It re-detects on a few windows of the track
  // and reports the agreement between them.
  async function estimateConfidence(buffer) {
    const sr = buffer.sampleRate;
    const chan = buffer.getChannelData(0);
    const windowSec = 12;
    const windowLen = Math.min(chan.length, windowSec * sr);
    const starts = [0, Math.floor(chan.length * 0.33), Math.floor(chan.length * 0.6)]
      .filter(s => s + windowLen <= chan.length);

    const results = [];
    for (const start of starts) {
      const slice = chan.subarray(start, start + windowLen);
      const miniBuffer = new AudioBuffer({ length: slice.length, sampleRate: sr, numberOfChannels: 1 });
      miniBuffer.copyToChannel(Float32Array.from(slice), 0);
      try {
        results.push(detect(miniBuffer));
      } catch (e) { /* skip window if too short/silent */ }
    }
    if (results.length < 2) return { confidence: 0.4, samples: results };

    // Normalize octave differences before comparing (70 vs 140 shouldn't count as disagreement)
    const base = results[0];
    const normalized = results.map(r => {
      while (r > base * 1.5) r /= 2;
      while (r < base / 1.5) r *= 2;
      return r;
    });
    const mean = normalized.reduce((a, b) => a + b, 0) / normalized.length;
    const variance = normalized.reduce((a, b) => a + (b - mean) ** 2, 0) / normalized.length;
    const stdev = Math.sqrt(variance);
    const confidence = Math.max(0.15, Math.min(1, 1 - stdev / mean));
    return { confidence, samples: results };
  }

  function drawWaveform(buffer, bpm) {
    const w = canvas.width, h = canvas.height;
    ctx2d.clearRect(0, 0, w, h);
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / w);
    ctx2d.fillStyle = '#3ea8a0';
    for (let x = 0; x < w; x++) {
      let min = 1.0, max = -1.0;
      for (let i = 0; i < step; i++) {
        const idx = x * step + i;
        if (idx >= data.length) break;
        const v = data[idx];
        if (v < min) min = v;
        if (v > max) max = v;
      }
      const yMin = (1 + min) * 0.5 * h;
      const yMax = (1 + max) * 0.5 * h;
      ctx2d.fillRect(x, yMin, 1, Math.max(1, yMax - yMin));
    }

    if (bpm) {
      const beatSec = 60 / bpm;
      const totalSec = buffer.duration;
      ctx2d.strokeStyle = 'rgba(232, 161, 60, 0.55)';
      ctx2d.lineWidth = 1;
      for (let t = 0; t < totalSec; t += beatSec) {
        const x = (t / totalSec) * w;
        ctx2d.beginPath();
        ctx2d.moveTo(x, 0);
        ctx2d.lineTo(x, h);
        ctx2d.stroke();
      }
    }
  }

  async function handleFile(file) {
    if (!file) return;
    setStatus('Decoding audio…');
    setBpm(null);
    confRow.style.display = 'none';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let buffer;
    try {
      buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
    } catch (e) {
      setStatus('Could not decode this file — try a different format.', true);
      return;
    }
    audioBuffer = buffer;

    if (buffer.duration < 6) {
      setStatus('Clip is short — detection is less reliable under ~6s.', true);
    }

    let bpm;
    try {
      bpm = detect(buffer);
    } catch (e) {
      setStatus('Could not detect a beat — try tap tempo below instead.', true);
      drawWaveform(buffer, null);
      return;
    }

    setBpm(bpm);
    drawWaveform(buffer, bpm);
    setStatus(`Detected from ${file.name}`);

    const { confidence } = await estimateConfidence(buffer);
    confRow.style.display = 'flex';
    confFill.style.width = `${Math.round(confidence * 100)}%`;
    confFill.style.background = confidence > 0.7 ? '#3ea8a0' : confidence > 0.4 ? '#e8a13c' : '#d9634a';
    if (confidence < 0.4) {
      setStatus('Low confidence — check ÷2/×2, or verify with tap tempo.', true);
    }
  }

  fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
  ['dragover'].forEach(evt => dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(evt => dropzone.addEventListener(evt, () => dropzone.classList.remove('drag')));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  halfBtn.addEventListener('click', () => {
    if (!currentBpm) return;
    setBpm(currentBpm / 2);
    if (audioBuffer) drawWaveform(audioBuffer, currentBpm);
  });
  doubleBtn.addEventListener('click', () => {
    if (!currentBpm) return;
    setBpm(currentBpm * 2);
    if (audioBuffer) drawWaveform(audioBuffer, currentBpm);
  });

  // Tap tempo — manual fallback when detection fails or for live/ambient audio.
  let taps = [];
  tapBtn.addEventListener('click', () => {
    const now = performance.now();
    taps = taps.filter(t => now - t < 3000); // reset if idle > 3s
    taps.push(now);
    if (taps.length >= 2) {
      const intervals = taps.slice(1).map((t, i) => t - taps[i]);
      const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      const bpm = 60000 / avgMs;
      setBpm(bpm);
      setStatus(`Tap tempo — ${taps.length} taps`);
    } else {
      setStatus('Keep tapping in time…');
    }
  });
</script>
